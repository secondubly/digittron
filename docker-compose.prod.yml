services:
  bot:
    container_name: bot
    build: 
        context: .
        args:
            DATABASE_URL: ${DATABASE_URL}
        secrets:
            - npmrc
            - npmrc_prod
    depends_on:
        postgres:
            condition: service_healthy
        redis:
            condition: service_healthy
    tty: true
    environment:
        DATABASE_URL: ${DATABASE_URL}
    env_file:
        - ./src/.env